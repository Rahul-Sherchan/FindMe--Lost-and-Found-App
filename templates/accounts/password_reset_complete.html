{% extends 'base.html' %}

{% block title %}Password Reset Complete - FindMe{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 3rem;">
    <div class="card fade-in text-center">
        <div class="card-body" style="padding: 3rem;">
            <div style="width: 80px; height: 80px; border-radius: 50%; background: rgba(16, 185, 129, 0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
                <i class="fas fa-check-circle" style="font-size: 2rem; color: var(--success);"></i>
            </div>
            <h2>Password Reset Complete!</h2>
            <p class="text-muted" style="margin: 1rem 0 2rem;">
                Your password has been successfully reset. You can now log in with your new password.
            </p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary" style="padding: 0.75rem 2.5rem;">
                <i class="fas fa-sign-in-alt"></i> Login Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
