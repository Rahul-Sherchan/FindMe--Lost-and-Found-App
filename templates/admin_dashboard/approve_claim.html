{% extends 'base.html' %}

{% block title %}Approve Claim - Admin{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 3rem;">
    <div class="card">
        <div class="card-header text-center">
            <h2><i class="fas fa-check-circle text-success"></i> Approve Claim</h2>
        </div>
        <div class="card-body">
            <p><strong>Claimant:</strong> {{ claim.claimant.username }}</p>
            <p><strong>Item:</strong> {{ claim.item.title }}</p>
            <p><strong>Reward Points:</strong> {{ claim.item.reward_points }}</p>

            <form method="post" class="mt-3">
                {% csrf_token %}
                <div class="form-group">
                    <label>Admin Notes</label>
                    <textarea name="admin_notes" class="form-control" rows="3"></textarea>
                </div>

                <div class="grid grid-2">
                    <a href="{% url 'admin_dashboard:manage_claims' %}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-success">Confirm Approval</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
