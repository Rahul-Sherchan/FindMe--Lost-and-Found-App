{% extends 'base.html' %}

{% block title %}Delete Post - Admin{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 3rem;">
    <div class="card">
        <div class="card-header text-center">
            <h2><i class="fas fa-trash text-danger"></i> Delete Post</h2>
        </div>
        <div class="card-body">
            <p class="text-center">Are you sure you want to delete this post?</p>
            <h3>{{ item.title }}</h3>
            <p>By: {{ item.user.username }}</p>

            <form method="post" class="mt-3">
                {% csrf_token %}
                <div class="grid grid-2">
                    <a href="{% url 'admin_dashboard:manage_posts' %}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
