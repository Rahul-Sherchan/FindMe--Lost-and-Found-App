{% extends 'base.html' %}

{% block title %}Suspend User - Admin{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 3rem;">
    <div class="card">
        <div class="card-header text-center">
            <h2><i class="fas fa-user-slash text-danger"></i> Suspend User</h2>
        </div>
        <div class="card-body">
            <p class="text-center">Are you sure you want to suspend this user?</p>
            <h3>{{ user_obj.username }}</h3>
            <p>{{ user_obj.email }}</p>

            <div class="alert alert-warning">
                This user will no longer be able to log in.
            </div>

            <form method="post" class="mt-3">
                {% csrf_token %}
                <div class="grid grid-2">
                    <a href="{% url 'admin_dashboard:manage_users' %}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-danger">Yes, Suspend</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
