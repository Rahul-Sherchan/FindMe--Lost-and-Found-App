{% extends 'base.html' %}

{% block title %}Mark as Resolved - FindMe{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 3rem;">
    <div class="card">
        <div class="card-header text-center">
            <h2 style="color: var(--success);"><i class="fas fa-check-circle"></i> Mark as Resolved</h2>
        </div>
        <div class="card-body text-center">
            <div style="padding: 1rem;">
                <i class="fas fa-check-double" style="font-size: 3rem; color: var(--success); margin-bottom: 1rem;"></i>
                <h3>Confirm Resolution</h3>
                <p class="text-muted">
                    Mark <strong>"{{ item.title }}"</strong> as resolved?
                    This means the item has been found and returned to its owner.
                </p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <a href="{% url 'items:item_detail' item.pk %}" class="btn btn-outline" style="flex: 1;">
                        <i class="fas fa-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-success" style="flex: 1;">
                        <i class="fas fa-check"></i> Mark Resolved
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
